name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main, dev]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.12.4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Prisma Generate
        run: pnpm exec prisma generate

      - name: ESLint (no autofix)
        env:
          CI: true
        run: pnpm run lint:check

      - name: Prettier
        run: pnpm run format:check

      - name: Unit tests
        env:
          CI: true
        run: pnpm run test

      - name: E2E tests
        env:
          CI: true
        run: pnpm run test:e2e

      - name: Build (Nest compile)
        env:
          CI: true
        run: pnpm run build
