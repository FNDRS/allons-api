name: Deploy (AWS App Runner)

on:
  push:
    branches: [main]

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    env:
      AWS_REGION: us-east-2
      ECR_REPOSITORY: allons-api

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS Credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::851725556357:role/GitHubActionsAllonsApiDeploy
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Resolve App Runner service ARN
        id: apprunner
        run: |
          SERVICE_ARN=$(aws apprunner list-services \
            --region "$AWS_REGION" \
            --query "ServiceSummaryList[?ServiceName=='allons-api'].ServiceArn | [0]" \
            --output text)
          if [ -z "$SERVICE_ARN" ] || [ "$SERVICE_ARN" = "None" ]; then
            echo "App Runner service 'allons-api' not found in region $AWS_REGION" >&2
            exit 1
          fi
          echo "service_arn=$SERVICE_ARN" >> "$GITHUB_OUTPUT"

      - name: Build, tag, and push image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG

      - name: Update App Runner service to new image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          aws apprunner update-service \
            --service-arn "${{ steps.apprunner.outputs.service_arn }}" \
            --source-configuration "{\"ImageRepository\":{\"ImageIdentifier\":\"$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG\",\"ImageRepositoryType\":\"ECR\",\"ImageConfiguration\":{\"Port\":\"3000\"}},\"AuthenticationConfiguration\":{\"AccessRoleArn\":\"arn:aws:iam::851725556357:role/AppRunnerECRAccessRole-allons-api\"},\"AutoDeploymentsEnabled\":true}"

      - name: Start Deployment
        run: |
          aws apprunner start-deployment --service-arn "${{ steps.apprunner.outputs.service_arn }}"
