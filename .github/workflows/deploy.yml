name: Deploy (AWS App Runner)

on:
  push:
    branches: [main]

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    env:
      AWS_REGION: us-east-2
      ECR_REPOSITORY: allons-api
      APP_RUNNER_SERVICE_NAME: allons-api
      # Optional: set this GitHub secret to skip ListServices permission.
      APP_RUNNER_SERVICE_ARN: ${{ secrets.APP_RUNNER_SERVICE_ARN }}
      # Shared secret used by allons-admin -> allons-api admin endpoints.
      ADMIN_API_SECRET: ${{ secrets.ADMIN_API_SECRET }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS Credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::851725556357:role/GitHubActionsAllonsApiDeploy
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Resolve App Runner service ARN
        id: apprunner
        run: |
          if [ -n "$APP_RUNNER_SERVICE_ARN" ]; then
            echo "Using APP_RUNNER_SERVICE_ARN from secrets."
            echo "service_arn=$APP_RUNNER_SERVICE_ARN" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          set +e
          SERVICE_ARN=$(aws apprunner list-services \
            --region "$AWS_REGION" \
            --query "ServiceSummaryList[?ServiceName=='$APP_RUNNER_SERVICE_NAME'].ServiceArn | [0]" \
            --output text 2>&1)
          STATUS=$?
          set -e

          if [ $STATUS -ne 0 ]; then
            echo "Failed to resolve App Runner service ARN by name." >&2
            echo "$SERVICE_ARN" >&2
            echo "" >&2
            echo "Fix one of these:" >&2
            echo "1) Add GitHub secret APP_RUNNER_SERVICE_ARN with your full service ARN." >&2
            echo "2) Grant the deploy role this permission: apprunner:ListServices." >&2
            exit $STATUS
          fi

          if [ -z "$SERVICE_ARN" ] || [ "$SERVICE_ARN" = "None" ]; then
            echo "App Runner service '$APP_RUNNER_SERVICE_NAME' not found in region $AWS_REGION" >&2
            exit 1
          fi
          echo "service_arn=$SERVICE_ARN" >> "$GITHUB_OUTPUT"

      - name: Build, tag, and push image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG

      - name: Wait for App Runner to be stable before update
        run: |
          SERVICE_ARN="${{ steps.apprunner.outputs.service_arn }}"
          for i in $(seq 1 40); do
            STATUS=$(aws apprunner describe-service \
              --service-arn "$SERVICE_ARN" \
              --query "Service.Status" \
              --output text)
            echo "Pre-update App Runner status: $STATUS"

            if [ "$STATUS" = "RUNNING" ]; then
              exit 0
            fi

            if [ "$STATUS" = "CREATE_FAILED" ] || [ "$STATUS" = "DELETE_FAILED" ]; then
              echo "Service entered failed state before update: $STATUS" >&2
              exit 1
            fi

            sleep 15
          done

          echo "Timed out waiting for service to be RUNNING before update." >&2
          exit 1

      - name: Update App Runner service to new image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          SERVICE_ARN="${{ steps.apprunner.outputs.service_arn }}"
          if [ -z "$ADMIN_API_SECRET" ]; then
            echo "Missing required GitHub secret: ADMIN_API_SECRET" >&2
            echo "Add it in repo settings and rerun deploy." >&2
            exit 1
          fi

          SOURCE_CONFIGURATION="{\"ImageRepository\":{\"ImageIdentifier\":\"$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG\",\"ImageRepositoryType\":\"ECR\",\"ImageConfiguration\":{\"Port\":\"3000\",\"RuntimeEnvironmentVariables\":{\"ADMIN_API_SECRET\":\"$ADMIN_API_SECRET\"}}},\"AuthenticationConfiguration\":{\"AccessRoleArn\":\"arn:aws:iam::851725556357:role/AppRunnerECRAccessRole-allons-api\"},\"AutoDeploymentsEnabled\":true}"

          for i in $(seq 1 8); do
            set +e
            OUT=$(aws apprunner update-service \
              --service-arn "$SERVICE_ARN" \
              --source-configuration "$SOURCE_CONFIGURATION" 2>&1)
            STATUS=$?
            set -e

            if [ $STATUS -eq 0 ]; then
              echo "$OUT"
              exit 0
            fi

            echo "$OUT"
            if echo "$OUT" | rg -q "InvalidStateException|OPERATION_IN_PROGRESS"; then
              echo "Service busy, retrying update in 20s... ($i/8)"
              sleep 20
              continue
            fi

            exit $STATUS
          done

          echo "Could not update service after retries due to App Runner busy state." >&2
          exit 1

      - name: Wait for App Runner service to become RUNNING
        run: |
          SERVICE_ARN="${{ steps.apprunner.outputs.service_arn }}"
          for i in $(seq 1 40); do
            STATUS=$(aws apprunner describe-service \
              --service-arn "$SERVICE_ARN" \
              --query "Service.Status" \
              --output text)
            echo "App Runner status: $STATUS"

            if [ "$STATUS" = "RUNNING" ]; then
              exit 0
            fi

            if [ "$STATUS" = "CREATE_FAILED" ] || [ "$STATUS" = "DELETE_FAILED" ]; then
              echo "Service entered failed state: $STATUS" >&2
              exit 1
            fi

            sleep 15
          done

          echo "Timed out waiting for service to be RUNNING." >&2
          exit 1
